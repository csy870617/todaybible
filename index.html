<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하루말씀</title>
    
    <meta name="google-site-verification" content="EhqISFpzRIIw1YRrvtpfqYxOl6FZ1kDFSxpYAJY3p2c" />

    <link rel="icon" href="thumbnail_5.png" type="image/png">
    <link rel="apple-touch-icon" href="thumbnail_5.png">
    <link rel="shortcut icon" href="thumbnail_5.png" type="image/png">

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="하루말씀">
    <meta property="og:title" content="2026 오늘의 말씀카드">
    <meta property="og:description" content="오늘 당신을 위한 말씀을 펼쳐보세요.">
    <meta property="og:image" content="https://csy870617.github.io/todaybible/thumbnail_5.png">
    <meta property="og:image:width" content="1280">
    <meta property="og:image:height" content="720">
    <meta property="og:url" content="https://csy870617.github.io/todaybible/">

    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"></script>

    <script>
        (function() {
            const userAgent = navigator.userAgent.toLowerCase();
            const targetUrl = location.href;
            if (userAgent.match(/kakaotalk|naver|line\/|instagram|facebook|fbav|fbios/i)) {
                if (userAgent.match(/android/i)) {
                    location.replace('intent://' + targetUrl.replace(/https?:\/\//i, '') + '#Intent;scheme=https;end');
                } else if (userAgent.match(/iphone|ipad|ipod/i)) {
                    if (userAgent.match(/kakaotalk/i)) {
                        location.replace('kakaotalk://web/openExternal?url=' + encodeURIComponent(targetUrl));
                    }
                }
            }
        })();
    </script>
</head>
<body>

    <div class="background-mesh"></div>

    <div class="glass-container">
        
        <section id="page-landing" class="page active">
            <div class="header-content">
                <p class="year-badge">2026 YEAR OF FAITH</p>
                <h1 class="main-title">하루를 여는<br><span class="highlight">하나님의 말씀</span></h1>
                <p class="sub-text">기도하는 마음으로<br>말씀을 펼쳐주세요.</p>
            </div>
            
            <div class="card-area">
                <div class="card-3d envelope-red">
                    <div class="envelope-flap"></div>
                    <div class="envelope-seal">✝</div>
                </div>
            </div>

            <button id="btn-draw" class="primary-btn glow-effect">말씀카드 열어 보기</button>

        </section>


        <section id="page-loading" class="page">
            <div class="loading-wrapper">
                <div class="book-shelf">
                    <div class="book-container">
                        <div class="book-page"></div>
                        <div class="book-page"></div>
                        <div class="book-page"></div>
                    </div>
                </div>
                <p class="loading-text">오늘 당신을 위한<br><span class="highlight">하나님의 말씀은?</span></p>
            </div>
        </section>


        <section id="page-result" class="page result-layout">
            <div class="image-frame-wrapper">
                <img id="result-img" src="" alt="" style="cursor: zoom-in;">
            </div>
            
            <div class="result-actions">
                <div class="button-row">
                    <button id="btn-save-img" class="glass-btn btn-save">
                        <span class="icon">⬇</span> <span class="label">말씀 저장</span>
                    </button>
                    <button id="btn-retry" class="glass-btn btn-retry">
                        <span class="icon">↻</span> 다른 말씀
                    </button>
                </div>
                
                <button id="btn-share-site" class="glass-btn btn-share" style="width: 100%; margin-top: 5px;">
                    <span class="icon">🔗</span> <span class="label">친구에게 공유하기</span>
                </button>
            </div>
        </section>

    </div>

    <div id="fullscreen-modal" class="fullscreen-modal">
        <img id="fullscreen-img" src="" alt="">
    </div>

    <script src="script.js"></script>
</body>
</html>
